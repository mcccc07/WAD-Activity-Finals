[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_sqlite", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.json", "nodePackages.npm"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "touch database/database.sqlite",
  "php artisan key:generate --force",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan migrate --force",
  "chmod -R 777 storage bootstrap/cache"
]